<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Apuntes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            min-height: 100vh;
            padding-top: 3rem;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            max-width: 200px;
        }
        .glass:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container max-w-4xl mx-auto">
        <header class="mb-5 text-center">
            <h1 class="display-4 fw-bold text-primary">🥩 Chuleting 🥩</h1>
            <p class="text-secondary">Mis notas rapidas de programación</p>
        </header>

        <div id="menu-grid" class="row row-cols-2 row-cols-md-4 g-4">
            <!-- Items generados por JS -->
        </div>

    </div>

    <script>
        const menuItems = [
            { name: 'HTML', icon: 'code-2', color: 'text-warning', link: 'html.html' },
            { name: 'CSS', icon: 'palette', color: 'text-primary', link: 'css.html' },
            { name: 'Bootstrap', icon: 'box', color: 'text-info', link: 'bootstrap.html' },
            { name: 'JavaScript', icon: 'terminal', color: 'text-warning', link: 'js' },
            { name: 'jQuery', icon: 'dollar-sign', color: 'text-primary', link: 'jq' },
            { name: 'DOM', icon: 'file-code-2', color: 'text-success', link: 'dom' },
            { name: 'Git/GitHub', icon: 'git-branch', color: 'text-secondary', link: 'git' },
            { name: 'SQL Server', icon: 'database', color: 'text-danger', link: '/sql-server.html' },
            { name: 'PHP', icon: 'globe', color: 'text-info', link: 'php' },
        ];

        const container = document.getElementById('menu-grid');

        menuItems.forEach(item => {
            const col = document.createElement('div');
            col.className = 'col';

            const card = document.createElement('a');
            card.target = '_blank';
            card.href = item.link;
            card.className = 'glass d-flex flex-column align-items-center justify-content-center p-4 h-100';
            
            card.innerHTML = `

                    <i data-lucide="${item.icon}" class="w-48 h-48 mb-3 ${item.color.replace('text-', 'text-')}"></i>
                    <span class="fs-5 fw-semibold">${item.name}</span>

            `;
            
            col.appendChild(card);
            container.appendChild(col);
        });

        // Inicializar iconos de Lucide
        lucide.createIcons();
    </script>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
